<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 대시보드 | 대여캠프</title>
<style>
:root{--bg:#0f1713;--panel:#17231d;--panel2:#101713;--ink:#f6f1e8;--muted:#c7bdad;--line:#304338;--green:#48b576;--sun:#f1a340;--blue:#62c7e8;--red:#ff7569}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,'Malgun Gothic',sans-serif;line-height:1.6}a{color:inherit;text-decoration:none}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px clamp(18px,5vw,64px);border-bottom:1px solid var(--line);background:#101b15}.brand{font-weight:950;font-size:1.2rem}.nav{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-weight:800}.nav a:hover{color:var(--sun)}.wrap{max-width:1280px;margin:0 auto;padding:34px 20px 72px}.hero{display:grid;grid-template-columns:1fr auto;gap:22px;align-items:end;margin-bottom:18px}.eyebrow{margin:0 0 8px;color:var(--green);font-weight:950;text-transform:uppercase}h1{margin:0;font-size:clamp(2rem,5vw,4.2rem);line-height:1.08}.lead{max-width:760px;color:var(--muted);font-size:1.05rem}.actions{display:flex;gap:10px;flex-wrap:wrap}.button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 16px;border:0;border-radius:8px;background:var(--sun);color:#20140a;font-weight:950;cursor:pointer}.button.secondary{background:#20352a;color:#dff8e9;border:1px solid #3c6f50}.button.blue{background:var(--blue);color:#071016}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:22px 0}.stat{padding:20px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,#1a251f,#131c17)}.stat span{color:var(--muted);font-weight:850}.stat strong{display:block;margin-top:8px;font-size:2rem}.layout{display:grid;grid-template-columns:320px 1fr;gap:14px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:18px}.panel h2{margin:0 0 14px;font-size:1.2rem}.form{display:grid;gap:12px}label{display:grid;gap:6px;color:#efe6d6;font-weight:850}input,select{width:100%;padding:11px 12px;border:1px solid #425548;border-radius:8px;background:var(--panel2);color:var(--ink);font:inherit}.notice{padding:13px 14px;border:1px solid #5e4c2b;background:#211b12;border-radius:8px;color:#ffe3b5}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}table{width:100%;min-width:900px;border-collapse:collapse;background:var(--panel2)}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:#ffd99e;background:#16221c;font-size:.9rem}td{color:#f4eadb}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;font-weight:950;font-size:.82rem}.ok{background:#173522;color:#9df0b1}.wait{background:#1c2a3b;color:#9dccff}.done{background:#3a211f;color:#ffaaa2}.pay{background:#362a16;color:#ffd48a}.tools{display:grid;grid-template-columns:1fr 160px 160px;gap:10px;margin-bottom:12px}.calendar-note{display:grid;gap:8px}.day-row{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2)}.day-row.blocked strong{color:var(--red)}.day-row.open strong{color:var(--green)}@media(max-width:980px){.hero,.layout,.stats,.tools{grid-template-columns:1fr}.header{align-items:flex-start;flex-direction:column}.button{width:100%}}
</style>
</head>
<body>
<header class="header"><a class="brand" href="index.html">대여캠프 관리자</a><nav class="nav"><a href="index.html">홈</a><a href="public/index.html">예약현황</a><a href="public/reserve.html">예약하기</a><a href="tent.html">텐트 설치</a><a href="tarp.html">타프 설치</a><a href="gallery.html">갤러리</a></nav></header>
<main class="wrap">
<section class="hero"><div><p class="eyebrow">Admin Dashboard</p><h1>예약 운영 대시보드</h1><p class="lead">예약자 리스트, 입금 상태, 예약 상태, 품목별 예약 현황을 한 화면에서 확인하는 관리자 페이지입니다.</p></div><div class="actions"><a class="button" href="http://ccymproxmox.iptime.org:8094/admin.html">실제 DB 관리자 열기</a><a class="button secondary" href="public/index.html">예약현황 보기</a></div></section>
<section class="stats"><article class="stat"><span>전체 예약</span><strong>4건</strong></article><article class="stat"><span>예약완료</span><strong>3건</strong></article><article class="stat"><span>입금대기</span><strong>1건</strong></article><article class="stat"><span>예약불가 기간</span><strong>6/4~6/8</strong></article></section>
<section class="layout"><aside class="panel"><h2>관리자 접속</h2><form class="form" id="adminForm"><label>관리자 비밀번호<input name="adminKey" type="password" placeholder="ADMIN_KEY 입력" required></label><button class="button" type="submit">DB 예약자 리스트 열기</button><p class="notice" id="adminMessage">실제 예약자 이름/연락처는 서버 DB 관리자에서 조회됩니다.</p></form><h2 style="margin-top:22px">예약 기준</h2><div class="calendar-note"><div class="day-row open"><span>6월 1일~3일</span><strong>예약가능</strong></div><div class="day-row blocked"><span>6월 4일~8일</span><strong>예약완료</strong></div><div class="day-row open"><span>6월 9일 이후</span><strong>예약가능</strong></div></div></aside>
<section class="panel"><h2>예약자 리스트</h2><div class="tools"><input id="search" placeholder="예약자, 연락처, 품목 검색"><select id="statusFilter"><option value="all">전체 상태</option><option value="confirmed">예약완료</option><option value="pending">입금대기</option><option value="canceled">취소</option></select><select id="itemFilter"><option value="all">전체 품목</option><option value="원터치 텐트">원터치 텐트</option><option value="타프">타프</option><option value="패키지 예약">패키지 예약</option></select></div><div class="table-wrap"><table><thead><tr><th>예약자</th><th>연락처</th><th>예약기간</th><th>품목</th><th>입금</th><th>예약상태</th><th>관리</th></tr></thead><tbody id="rows"></tbody></table></div></section></section>
</main>
<script>
const reservations=[{name:'김민수',phone:'010-1234-5678',period:'2026-06-04 ~ 2026-06-08',item:'원터치 텐트, 타프, 패키지 예약',pay:'입금완료',status:'confirmed'},{name:'박지은',phone:'010-2345-6789',period:'2026-06-10 ~ 2026-06-11',item:'원터치 텐트',pay:'입금대기',status:'pending'},{name:'이도윤',phone:'010-3456-7890',period:'2026-06-15 ~ 2026-06-16',item:'타프',pay:'입금완료',status:'confirmed'},{name:'최서연',phone:'010-4567-8901',period:'2026-06-21 ~ 2026-06-22',item:'패키지 예약',pay:'입금완료',status:'confirmed'}];
const rows=document.querySelector('#rows');
function statusBadge(s){return s==='confirmed'?'<span class="badge ok">예약완료</span>':s==='pending'?'<span class="badge wait">입금대기</span>':'<span class="badge done">취소</span>'}
function render(){const q=document.querySelector('#search').value.trim();const st=document.querySelector('#statusFilter').value;const it=document.querySelector('#itemFilter').value;rows.innerHTML=reservations.filter(r=>(!q||(r.name+r.phone+r.item).includes(q))&&(st==='all'||r.status===st)&&(it==='all'||r.item.includes(it))).map(r=>`<tr><td><strong>${r.name}</strong></td><td>${r.phone}</td><td>${r.period}</td><td>${r.item}</td><td><span class="badge pay">${r.pay}</span></td><td>${statusBadge(r.status)}</td><td><select><option>예약완료</option><option>입금대기</option><option>취소</option></select></td></tr>`).join('')||'<tr><td colspan="7">검색 결과가 없습니다.</td></tr>'}
document.querySelectorAll('#search,#statusFilter,#itemFilter').forEach(el=>el.addEventListener('input',render));
document.querySelector('#adminForm').addEventListener('submit',e=>{e.preventDefault();const key=new FormData(e.currentTarget).get('adminKey');location.href='http://ccymproxmox.iptime.org:8094/admin.html?adminKey='+encodeURIComponent(key||'')});
render();
</script>
</body>
</html>
