<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예약자 리스트 | 대여캠프 관리자</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"></span><span>대여캠프 관리자</span></a>
      <nav><a href="index.html">예약 달력</a><a href="reserve.html">예약하기</a></nav>
    </header>
    <main>
      <section class="section admin-layout">
        <div class="section-heading align-left">
          <p class="eyebrow">Admin Reservation List</p>
          <h1>예약한 사람들 리스트</h1>
          <p>관리자 비밀번호를 입력하면 MySQL DB에 저장된 예약자 이름, 연락처, 예약기간, 예약 품목, 입금 상태, 예약 상태를 확인하고 수정할 수 있습니다.</p>
        </div>
        <form class="admin-login" id="adminLogin">
          <label>관리자 비밀번호 <input name="adminKey" type="password" required placeholder="ADMIN_KEY 입력"></label>
          <button class="button primary" type="submit">DB 예약자 리스트 보기</button>
          <p class="form-message" id="adminMessage" role="status"></p>
        </form>
        <div class="admin-list" id="adminList"></div>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
