<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약수정 | 대여캠프</title>
<style>
:root{--bg:#101419;--panel:#18212a;--ink:#f4f7fb;--muted:#c5ced8;--line:#334352;--blue:#62c7e8;--sun:#f1a340}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,'Malgun Gothic',sans-serif;line-height:1.6}a{color:inherit;text-decoration:none}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px clamp(18px,5vw,64px);border-bottom:1px solid var(--line);background:#111922}.brand{font-weight:950;font-size:1.2rem}.nav{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-weight:800}.nav a:hover{color:var(--sun)}.wrap{max-width:980px;margin:0 auto;padding:58px 20px}.panel{background:linear-gradient(180deg,#1b2630,#121a22);border:1px solid var(--line);border-radius:8px;padding:clamp(22px,4vw,36px)}.eyebrow{margin:0 0 10px;color:var(--blue);font-weight:950;text-transform:uppercase}h1{margin:0;font-size:clamp(2.1rem,5vw,4rem);line-height:1.08}.lead{color:var(--muted);font-size:1.06rem}.form{display:grid;gap:14px;margin-top:26px}label{display:grid;gap:7px;font-weight:850}input,textarea,select{width:100%;padding:13px;border:1px solid #42576a;border-radius:8px;background:#101419;color:var(--ink);font:inherit}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.button{min-height:50px;border:0;border-radius:8px;background:var(--blue);color:#061016;font:inherit;font-weight:950;cursor:pointer}.result{display:none;margin-top:24px;padding:18px;border:1px solid #3c6578;border-radius:8px;background:#101d26}.result.show{display:block}.status{display:inline-flex;padding:6px 10px;border-radius:8px;background:#173342;color:#a9eaff;font-weight:900}@media(max-width:720px){.header{align-items:flex-start;flex-direction:column}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header"><a class="brand" href="../index.html">대여캠프</a><nav class="nav"><a href="index.html">예약현황</a><a href="reserve.html">예약하기</a><a href="check.html">예약확인</a><a href="cancel.html">예약취소</a></nav></header>
<main class="wrap"><section class="panel"><p class="eyebrow">Reservation Edit</p><h1>예약수정</h1><p class="lead">예약번호 또는 예약자 정보를 입력하고 변경할 내용을 남겨주세요. 접수 후 담당자가 확인할 수 있는 형태로 저장됩니다.</p><form class="form" id="editForm"><div class="row"><label>예약자명<input name="name" required placeholder="홍길동"></label><label>연락처<input name="phone" required placeholder="010-0000-0000"></label></div><div class="row"><label>변경 희망일<input name="date" type="date"></label><label>변경 항목<select name="type"><option>날짜 변경</option><option>장비 변경</option><option>인원 변경</option><option>연락처 변경</option></select></label></div><label>수정 요청 내용<textarea name="message" rows="5" required placeholder="변경하고 싶은 내용을 적어주세요."></textarea></label><button class="button" type="submit">수정 요청 접수</button></form><div class="result" id="result"><span class="status">수정 접수</span><h2>예약수정 요청이 정상 접수되었습니다.</h2><p id="summary"></p></div></section></main>
<script>
document.querySelector('#editForm').addEventListener('submit',event=>{event.preventDefault();const data=new FormData(event.currentTarget);const item={name:data.get('name'),phone:data.get('phone'),type:data.get('type'),message:data.get('message'),savedAt:new Date().toISOString()};const list=JSON.parse(localStorage.getItem('campEditRequests')||'[]');list.push(item);localStorage.setItem('campEditRequests',JSON.stringify(list));document.querySelector('#summary').textContent=item.name+'님의 '+item.type+' 요청이 저장되었습니다. 현재 브라우저에 '+list.length+'건의 수정 요청이 보관되어 있습니다.';document.querySelector('#result').classList.add('show');event.currentTarget.reset();});
</script>
</body>
</html>
