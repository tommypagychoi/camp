<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약취소 | 대여캠프</title>
<style>
:root{--bg:#17120f;--panel:#241b15;--ink:#fff4e8;--muted:#d8c8b7;--line:#4a382d;--orange:#f1a340;--red:#ff7569}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,'Malgun Gothic',sans-serif;line-height:1.6}a{color:inherit;text-decoration:none}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px clamp(18px,5vw,64px);border-bottom:1px solid var(--line);background:#1a130f}.brand{font-weight:950;font-size:1.2rem}.nav{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-weight:800}.nav a:hover{color:var(--orange)}.wrap{max-width:980px;margin:0 auto;padding:58px 20px}.panel{background:linear-gradient(180deg,#281d16,#1a130f);border:1px solid var(--line);border-radius:8px;padding:clamp(22px,4vw,36px)}.eyebrow{margin:0 0 10px;color:var(--orange);font-weight:950;text-transform:uppercase}h1{margin:0;font-size:clamp(2.1rem,5vw,4rem);line-height:1.08}.lead{color:var(--muted);font-size:1.06rem}.form{display:grid;gap:14px;margin-top:26px}label{display:grid;gap:7px;font-weight:850}input,textarea,select{width:100%;padding:13px;border:1px solid #60483a;border-radius:8px;background:#17120f;color:var(--ink);font:inherit}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.button{min-height:50px;border:0;border-radius:8px;background:var(--orange);color:#211407;font:inherit;font-weight:950;cursor:pointer}.result{display:none;margin-top:24px;padding:18px;border:1px solid #7b5a35;border-radius:8px;background:#21170f}.result.show{display:block}.status{display:inline-flex;padding:6px 10px;border-radius:8px;background:#3a2516;color:#ffd08a;font-weight:900}.warning{margin-top:18px;padding:14px 16px;border:1px solid #704139;background:#261716;border-radius:8px;color:#ffd8d2}@media(max-width:720px){.header{align-items:flex-start;flex-direction:column}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header"><a class="brand" href="../index.html">대여캠프</a><nav class="nav"><a href="index.html">예약현황</a><a href="reserve.html">예약하기</a><a href="check.html">예약확인</a><a href="edit.html">예약수정</a></nav></header>
<main class="wrap"><section class="panel"><p class="eyebrow">Reservation Cancel</p><h1>예약취소</h1><p class="lead">예약자 정보와 취소 사유를 입력하면 취소 요청이 접수됩니다. 환불 여부는 결제 상태 확인 후 처리됩니다.</p><p class="warning">당일 취소 또는 성수기 예약은 환불 규정이 다를 수 있으니 담당자 확인이 필요합니다.</p><form class="form" id="cancelForm"><div class="row"><label>예약자명<input name="name" required placeholder="홍길동"></label><label>연락처<input name="phone" required placeholder="010-0000-0000"></label></div><label>취소 사유<select name="reason"><option>일정 변경</option><option>날씨 문제</option><option>장비 변경 필요</option><option>기타</option></select></label><label>상세 내용<textarea name="message" rows="5" placeholder="추가로 전달할 내용을 적어주세요."></textarea></label><button class="button" type="submit">취소 요청 접수</button></form><div class="result" id="result"><span class="status">취소 접수</span><h2>예약취소 요청이 정상 접수되었습니다.</h2><p id="summary"></p></div></section></main>
<script>
document.querySelector('#cancelForm').addEventListener('submit',event=>{event.preventDefault();const data=new FormData(event.currentTarget);const item={name:data.get('name'),phone:data.get('phone'),reason:data.get('reason'),message:data.get('message'),savedAt:new Date().toISOString()};const list=JSON.parse(localStorage.getItem('campCancelRequests')||'[]');list.push(item);localStorage.setItem('campCancelRequests',JSON.stringify(list));document.querySelector('#summary').textContent=item.name+'님의 취소 요청이 저장되었습니다. 현재 브라우저에 '+list.length+'건의 취소 요청이 보관되어 있습니다.';document.querySelector('#result').classList.add('show');event.currentTarget.reset();});
</script>
</body>
</html>
