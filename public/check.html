<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약확인 | 대여캠프</title>
<style>
:root{--bg:#101713;--panel:#18231d;--ink:#f6f1e8;--muted:#c7bdad;--line:#304338;--green:#48b576;--sun:#f1a340;--blue:#62c7e8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,'Malgun Gothic',sans-serif;line-height:1.6}a{color:inherit;text-decoration:none}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px clamp(18px,5vw,64px);border-bottom:1px solid var(--line);background:#101b15}.brand{font-weight:950;font-size:1.2rem}.nav{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-weight:800}.nav a:hover{color:var(--sun)}.wrap{max-width:980px;margin:0 auto;padding:58px 20px}.panel{background:linear-gradient(180deg,#1a251f,#131c17);border:1px solid var(--line);border-radius:8px;padding:clamp(22px,4vw,36px)}.eyebrow{margin:0 0 10px;color:var(--green);font-weight:950;text-transform:uppercase}h1{margin:0;font-size:clamp(2.1rem,5vw,4rem);line-height:1.08}.lead{color:var(--muted);font-size:1.06rem}.form{display:grid;gap:14px;margin-top:26px}label{display:grid;gap:7px;font-weight:850}input{width:100%;padding:13px;border:1px solid #425548;border-radius:8px;background:#101713;color:var(--ink);font:inherit}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.button{min-height:50px;border:0;border-radius:8px;background:var(--green);color:#06100b;font:inherit;font-weight:950;cursor:pointer}.result{display:none;margin-top:24px;padding:18px;border:1px solid #426a52;border-radius:8px;background:#102019}.result.show{display:block}.status{display:inline-flex;padding:6px 10px;border-radius:8px;background:#20352a;color:#91f2b1;font-weight:900}.hint{margin-top:16px;color:var(--muted)}@media(max-width:720px){.header{align-items:flex-start;flex-direction:column}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header"><a class="brand" href="../index.html">대여캠프</a><nav class="nav"><a href="index.html">예약현황</a><a href="reserve.html">예약하기</a><a href="edit.html">예약수정</a><a href="cancel.html">예약취소</a></nav></header>
<main class="wrap"><section class="panel"><p class="eyebrow">Reservation Check</p><h1>예약확인</h1><p class="lead">예약자명과 연락처를 입력하면 예약 접수 상태를 확인할 수 있습니다. 서버 연결 전에는 화면에서 정상 접수 안내를 제공합니다.</p><form class="form" id="checkForm"><div class="row"><label>예약자명<input name="name" required placeholder="홍길동"></label><label>연락처<input name="phone" required placeholder="010-0000-0000"></label></div><button class="button" type="submit">예약 확인하기</button></form><div class="result" id="result"><span class="status">확인 접수</span><h2>예약 확인 요청이 정상 접수되었습니다.</h2><p id="summary"></p><p class="hint">실제 입금확정/예약완료 상태 조회는 MySQL 서버 관리자 기능이 연결되면 자동으로 연동할 수 있습니다.</p></div></section></main>
<script>
document.querySelector('#checkForm').addEventListener('submit',event=>{event.preventDefault();const data=new FormData(event.currentTarget);document.querySelector('#summary').textContent=data.get('name')+'님의 예약 정보를 확인 중입니다. 연락처 '+data.get('phone')+' 기준으로 담당자가 확인할 수 있습니다.';document.querySelector('#result').classList.add('show');});
</script>
</body>
</html>
